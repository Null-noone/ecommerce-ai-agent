Name: ecommerce-api
Host: 0.0.0.0
Port: 8080

Log:
  ServiceName: ecommerce-api
  Mode: console
  Level: info

Mysql:
  DataSource: ${MYSQL_USER}:${MYSQL_PASSWORD}@tcp(${MYSQL_HOST}:${MYSQL_PORT})/${MYSQL_DATABASE}?charset=utf8mb4&parseTime=True&loc=Local

Redis:
  Host: ${REDIS_HOST}
  Port: ${REDIS_PORT}
  Pass: ${REDIS_PASSWORD}

Kafka:
  Brokers:
    - ${KAFKA_HOST}:${KAFKA_PORT}
  Topic: order_events

PythonService:
  Endpoints:
    - ${PYTHON_SERVICE_URL}

Auth:
  Secret: your-secret-key-change-in-production
  Expire: 86400
